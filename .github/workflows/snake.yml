name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Maddie-06

          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=#ffb7d5&color_dots=#ffe5ec,#ffc2d1,#ffb3c6,#ff8fab,#fb6f92

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}